name: tapem
description: "Tap'em — Gym workout tracking platform. NFC-first, offline-capable, multi-tenant."
publish_to: "none"
version: 1.0.0+9

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Localisation
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.8.1

  # Local database (offline-first)
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.30

  # NFC
  nfc_manager: ^4.0.2

  # Nutrition (barcode scanning + Open Food Facts)
  mobile_scanner: ^5.2.3
  http: ^1.4.0

  # Media picking (avatar upload)
  image_picker: ^1.1.2
  app_links: ^6.4.0

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Charts
  fl_chart: ^0.68.0

  # SVG rendering (body map visualisation)
  flutter_svg: ^2.0.17

  # UI utilities
  gap: ^3.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  equatable: ^2.0.7
  intl: ^0.20.2
  collection: ^1.19.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.3.0
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.4
  drift_dev: ^2.21.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
