name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Analyze + Test ─────────────────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: tapem
        run: flutter pub get

      - name: Verify formatting
        working-directory: tapem
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: tapem
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        working-directory: tapem
        run: flutter test test/unit/ --coverage --reporter=github

      - name: Run widget tests
        working-directory: tapem
        run: flutter test test/widget/ --reporter=github

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: tapem/coverage
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─── Build verification ─────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Build APK (debug)
        working-directory: tapem
        run: |
          flutter build apk --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-15
    needs: test
    timeout-minutes: 45
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: stable
          cache: true

      - name: Build iOS (no codesign)
        working-directory: tapem
        run: |
          flutter build ios --no-codesign --debug \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  # ─── Security scan ──────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./tapem
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Check for Service-Role key leaks
        working-directory: tapem
        run: |
          # Fail if any dart/ts file contains service_role_key pattern
          if grep -rn "service_role" lib/ --include="*.dart" 2>/dev/null; then
            echo "❌ SECURITY: Service role key reference found in client code!"
            exit 1
          fi
          echo "✅ No service role key leaks found"
