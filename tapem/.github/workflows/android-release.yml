name: Android Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional Flutter build number override"
        required: false
        type: string

jobs:
  bundle:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: tapem
        run: flutter pub get

      - name: Build signed AAB
        working-directory: tapem
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.build_number }}" ]; then
            EXTRA_ARGS="--build-number=${{ inputs.build_number }}"
          fi

          flutter build appbundle --release $EXTRA_ARGS \
            --dart-define=SUPABASE_URL=${SUPABASE_URL} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tapem-app-release-aab
          path: tapem/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
