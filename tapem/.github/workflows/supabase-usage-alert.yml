name: Supabase Usage Alert

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  usage-alert:
    name: Check Supabase usage proxy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secret wiring
        run: |
          if [ -z "${SUPABASE_PROJECT_REF}" ] || [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing required secrets. Set SUPABASE_PROJECT_REF + SUPABASE_ACCESS_TOKEN."
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run usage alert check
        working-directory: tapem
        run: ./scripts/monitor/supabase_usage_alert.sh
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_USAGE_ALERT_WEBHOOK_URL: ${{ secrets.SUPABASE_USAGE_ALERT_WEBHOOK_URL }}
          SUPABASE_ALERT_WARN_TOTAL_REQUESTS: ${{ vars.SUPABASE_ALERT_WARN_TOTAL_REQUESTS }}
          SUPABASE_ALERT_CRIT_TOTAL_REQUESTS: ${{ vars.SUPABASE_ALERT_CRIT_TOTAL_REQUESTS }}
          SUPABASE_ALERT_WARN_REST_REQUESTS: ${{ vars.SUPABASE_ALERT_WARN_REST_REQUESTS }}
          SUPABASE_ALERT_CRIT_REST_REQUESTS: ${{ vars.SUPABASE_ALERT_CRIT_REST_REQUESTS }}
          SUPABASE_ALERT_STRICT_WARN_FAIL: ${{ vars.SUPABASE_ALERT_STRICT_WARN_FAIL }}
          SUPABASE_ALERT_SEND_OK: ${{ vars.SUPABASE_ALERT_SEND_OK }}
          SUPABASE_USAGE_INTERVAL: ${{ vars.SUPABASE_USAGE_INTERVAL }}
